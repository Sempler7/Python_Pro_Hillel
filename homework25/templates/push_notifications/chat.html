<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4" style="max-width: 800px;">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">💬 Чат</h4>
        <span class="badge bg-success fs-6">🟢 Онлайн: <span id="online-count">0</span></span>
    </div>

    <div class="alert {% if user.is_authenticated %}alert-success{% else %}alert-warning{% endif %} py-2">
        {% if user.is_authenticated %}
            Ви увійшли як: <strong>{{ user.username }}</strong>
            <form method="post" action="/accounts/logout/" class="d-inline float-end">
                {% csrf_token %}
                <button type="submit" class="btn btn-sm btn-outline-danger">Вийти</button>
            </form>
        {% else %}
            Ви гість. <a href="/accounts/login/">Увійти</a>, щоб писати повідомлення.
        {% endif %}
    </div>

    <div id="messages" class="border rounded bg-white p-3 mb-3" style="height: 350px; overflow-y: auto;"></div>

    <div class="input-group mb-2">
        <input id="message-input" type="text" class="form-control" placeholder="Ваше повідомлення...">
        <button class="btn btn-primary" onclick="sendMessage()">Надіслати</button>
    </div>

    {% if user.is_staff %}
        <div class="input-group">
            <input id="notif-input" type="text" class="form-control" placeholder="Текст нотифікації...">
            <button class="btn btn-warning" onclick="sendNotification()">Push повідомлення</button>
        </div>
    {% endif %}

</div>

<script>
    const ws = new WebSocket('ws://' + window.location.host + '/ws/chat/');
    const messages = document.getElementById('messages');

    ws.onmessage = function (e) {
        const data = JSON.parse(e.data);

        if (data.type === 'online_count') {
            document.getElementById('online-count').textContent = data.count;
        } else if (data.type === 'chat_message') {
            messages.innerHTML += `<div class="mb-1"><strong>${data.username}:</strong> ${data.message}</div>`;
            messages.scrollTop = messages.scrollHeight;
        } else if (data.type === 'push_notification') {
            messages.innerHTML += `<div class="alert alert-warning py-1 mb-1">🔔 <strong>${data.from_user}:</strong> ${data.message}</div>`;
            messages.scrollTop = messages.scrollHeight;
        } else if (data.type === 'error') {
            messages.innerHTML += `<div class="text-danger mb-1">⚠️ ${data.message}</div>`;
        }
    };

    function sendMessage() {
        const input = document.getElementById('message-input');
        if (!input.value) return;
        ws.send(JSON.stringify({type: 'chat_message', message: input.value}));
        input.value = '';
    }

    function sendNotification() {
        const input = document.getElementById('notif-input');
        if (!input.value) return;
        ws.send(JSON.stringify({type: 'push_notification', message: input.value}));
        input.value = '';
    }
</script>
</body>
</html>
