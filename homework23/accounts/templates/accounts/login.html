<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
</head>
<body>
    <h1>Форма входу</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <label>Ім'я:</label>
        <input type="text" name="username" required>

        <label>Вік:</label>
        <input type="number" name="age" required>

        <button type="submit">Увійти</button>
    </form>
</body>
</html>
