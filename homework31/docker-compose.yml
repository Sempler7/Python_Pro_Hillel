services:
  django:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mysql
    volumes:
      - .:/app
    networks:
      - app_network

  postgres:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_DATABASE: additional_db
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app_network

volumes:
  postgres_data:
  mysql_data:

networks:
  app_network:
    driver: bridge