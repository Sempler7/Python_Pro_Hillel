apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: django-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter
          env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://postgres_user:postgres_password@postgres:5432/main_db?sslmode=disable"
          ports:
            - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: django-k8s
spec:
  selector:
    app: postgres-exporter
  ports:
    - port: 9187
      targetPort: 9187