apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: django-k8s
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: postgres:16
              command:
                - /bin/sh
                - -c
                - pg_dump -h postgres -U postgres_user main_db > /tmp/backup.sql
              env:
                - name: PGPASSWORD
                  value: postgres_password
          restartPolicy: OnFailure