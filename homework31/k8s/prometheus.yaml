apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: django-k8s
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: postgres
        static_configs:
          - targets:
              - postgres-exporter:9187

      - job_name: mysql
        static_configs:
          - targets:
              - mysql-exporter:9104
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: django-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: django-k8s
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090